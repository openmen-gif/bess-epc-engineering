name: Keep HF Space Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 실행 (하루 4회)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://openmen-gif-bess-epc-engineering.hf.space \
            --max-time 30 || true
